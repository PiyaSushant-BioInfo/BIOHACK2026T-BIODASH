{% extends "base.html" %}
{% block title %}TBAnalytica — Report{% endblock %}

{% block content %}
<div class="report-page">
    <button class="back-btn" onclick="history.back()">&larr; Back to Results</button>

    <div class="report-header-block">
        <h1>{{ title }}</h1>
        <p class="report-meta">
            Patient ID: <strong>{{ data.patient_id }}</strong> &middot;
            Generated: {{ now }}
        </p>
    </div>

    <div class="report-body">
        {{ content | safe }}
    </div>

    <div class="report-footer">
        <p><em>Generated by TBAnalytica &middot; WHO 2022 Guidelines &middot; For clinical use in Nepal</em></p>
    </div>
</div>
{% endblock %}
