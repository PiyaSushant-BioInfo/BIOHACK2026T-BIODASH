<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TBAnalytica{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">&#9764;</span>
                <span class="logo-text">TBAnalytica</span>
                <span class="logo-version">v1.0</span>
            </a>
            <nav class="header-nav">
                <span class="nav-tagline">TB Variant Analysis &amp; Clinical Decision Support</span>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>TBAnalytica &mdash; Clinical Decision Support for Nepal &middot; WHO 2022 Guidelines</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
